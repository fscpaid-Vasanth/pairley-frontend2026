<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- =========================================================
         STEP 2 — HTML Title
         ========================================================= -->
    <title>Pairley | Buy Together. Save Together.</title>

    <!-- =========================================================
         STEP 3 — Production Meta Tags
         ========================================================= -->
    <meta name="description" content="Pairley is India's smart local group-buying marketplace where customers discover exclusive offers from restaurants, gyms, salons, retail stores and local businesses. Join deals together and save more." />
    <meta name="keywords" content="Pairley, group buying India, buy together save together, group deals, restaurant offers, gym memberships, salon deals, retail discounts, local business deals, BOGO deals, pair deals, collaborative shopping India, group discounts" />
    <meta name="author" content="Pairley" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://www.pairley.com/" />
    <meta name="theme-color" content="#5B12D6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#5B12D6" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta http-equiv="content-language" content="en-IN" />
    <meta name="geo.region" content="IN" />
    <meta name="geo.country" content="India" />
    <meta name="language" content="English" />
    <meta name="rating" content="general" />
    <meta name="revisit-after" content="7 days" />
    <meta name="category" content="Group Buying Marketplace" />

    <!-- =========================================================
         STEP 12 — Google Search Console Verification
         Replace YOUR_GOOGLE_VERIFICATION_CODE with real token
         ========================================================= -->
    <!-- <meta name="google-site-verification" content="YOUR_GOOGLE_VERIFICATION_CODE" /> -->

    <!-- =========================================================
         STEP 4 — Open Graph Tags
         ========================================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pairley" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:url" content="https://www.pairley.com/" />
    <meta property="og:title" content="Pairley | Buy Together. Save Together." />
    <meta property="og:description" content="Pairley is India's smart local group-buying marketplace. Discover exclusive offers from restaurants, gyms, salons and local businesses. Join deals together and save more." />
    <meta property="og:image" content="https://www.pairley.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://www.pairley.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Pairley — Buy Together. Save Together. India's Group Buying Marketplace" />
    <meta property="og:image:type" content="image/png" />

    <!-- =========================================================
         STEP 5 — Twitter Card Tags
         ========================================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@pairley" />
    <meta name="twitter:creator" content="@pairley" />
    <meta name="twitter:title" content="Pairley | Buy Together. Save Together." />
    <meta name="twitter:description" content="India's smart local group-buying marketplace. Exclusive offers from restaurants, gyms, salons and local businesses. Join deals together, save more." />
    <meta name="twitter:image" content="https://www.pairley.com/og-image.png" />
    <meta name="twitter:image:alt" content="Pairley — Buy Together. Save Together." />

    <!-- LinkedIn / WhatsApp / Facebook additional -->
    <meta property="og:see_also" content="https://instagram.com/pairley" />
    <meta property="og:see_also" content="https://twitter.com/pairley" />
    <meta property="og:see_also" content="https://linkedin.com/company/pairley" />

    <!-- =========================================================
         STEP 7 — Favicon Configuration
         ========================================================= -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#5B12D6" />
    <meta name="msapplication-TileColor" content="#5B12D6" />
    <meta name="msapplication-TileImage" content="/android-chrome-192x192.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- =========================================================
         STEP 17 — PWA Manifest
         ========================================================= -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pairley" />
    <meta name="application-name" content="Pairley" />
    <meta name="format-detection" content="telephone=no" />

    <!-- =========================================================
         STEP 6 — JSON-LD Structured Data
         Organization + Website + WebApplication + SearchAction
         ========================================================= -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.pairley.com/#organization",
          "name": "Pairley",
          "alternateName": "Pairley India",
          "description": "Pairley is India's smart local group-buying marketplace where customers discover exclusive offers from restaurants, gyms, salons, retail stores and local businesses.",
          "url": "https://www.pairley.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.pairley.com/logo.png",
            "width": 512,
            "height": 512,
            "caption": "Pairley Logo"
          },
          "image": "https://www.pairley.com/og-image.png",
          "slogan": "Buy Together. Save Together.",
          "email": "support@pairley.com",
          "foundingDate": "2024",
          "foundingLocation": {
            "@type": "Place",
            "addressCountry": "IN"
          },
          "areaServed": {
            "@type": "Country",
            "name": "India"
          },
          "sameAs": [
            "https://instagram.com/pairley",
            "https://twitter.com/pairley",
            "https://linkedin.com/company/pairley",
            "https://youtube.com/@pairley"
          ],
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "support@pairley.com",
            "availableLanguage": "English"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://www.pairley.com/#website",
          "url": "https://www.pairley.com/",
          "name": "Pairley",
          "description": "India's smart local group-buying marketplace",
          "publisher": {
            "@id": "https://www.pairley.com/#organization"
          },
          "inLanguage": "en-IN",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.pairley.com/deals?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "WebApplication",
          "@id": "https://www.pairley.com/#webapp",
          "name": "Pairley",
          "url": "https://www.pairley.com/",
          "applicationCategory": "ShoppingApplication",
          "operatingSystem": "Any",
          "browserRequirements": "Requires JavaScript. Requires HTML5.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "INR"
          },
          "description": "Group buying marketplace app for local businesses in India.",
          "publisher": {
            "@id": "https://www.pairley.com/#organization"
          }
        }
      ]
    }
    </script>

    <!-- =========================================================
         STEP 15 — Core Web Vitals: Preloads
         ========================================================= -->
    <!-- DNS Prefetch & Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com" />

    <!-- Preload critical logo -->
    <link rel="preload" as="image" href="/logo.png" type="image/png" />

    <!-- Fonts — loaded with display=swap for non-blocking render -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS CDN (existing — preserved to avoid breaking functionality) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#000f22",
              "secondary": "#5B12D6",
              "vibrant-violet": "#6D4EE3",
              "surface-container": "rgba(255, 255, 255, 0.4)",
              "surface-subtle": "rgba(255, 255, 255, 0.3)",
              "surface-dim": "rgba(255, 255, 255, 0.2)",
              "background": "transparent",
              "surface": "rgba(255, 255, 255, 0.45)",
              "on-surface": "#091d2d",
              "on-surface-variant": "#43474d",
              "outline": "rgba(255, 255, 255, 0.55)",
              "outline-variant": "rgba(255, 255, 255, 0.35)",
            }
          }
        }
      };
    </script>
